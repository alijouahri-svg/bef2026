<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOA Academy · BEF 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{--teal:#00B4C8;--blue:#003087;--white:#fff;--bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#1a2a4a;--muted:#64748b;--green:#059669;--green-bg:#d1fae5;--red:#dc2626;--red-bg:#fee2e2;--amber:#d97706;--amber-bg:#fef3c7;--purple:#7c3aed;--purple-bg:#ede9fe;--radius:10px;--shadow:0 1px 3px rgba(0,48,135,.08),0 1px 2px rgba(0,48,135,.04);--font:'Plus Jakarta Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,var(--teal),var(--blue))}
.lcard{background:#fff;border-radius:20px;padding:40px 48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);min-width:280px}
.lcard-title{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.lcard-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Login */
#login-page{min-height:100vh;background:linear-gradient(135deg,var(--teal) 0%,var(--blue) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 25px 80px rgba(0,48,135,.3)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.login-logo-icon svg{width:32px;height:32px;fill:white}
.login-title{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.login-subtitle{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.fgroup{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--teal)}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:6px}
.btn-primary:hover{opacity:.9}
.login-error{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
/* App shell */
#app-shell{display:flex;height:100vh;overflow:hidden;display:none}
.sidebar{width:248px;background:var(--blue);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-header{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{color:#fff;font-size:15px;font-weight:800;letter-spacing:-.3px}
.sb-sub{color:rgba(255,255,255,.55);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{color:#fff;font-size:13px;font-weight:700}
.sb-user-role{color:rgba(255,255,255,.55);font-size:11px;margin-top:1px}
.sb-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px;background:rgba(0,180,200,.3);color:rgba(255,255,255,.9)}
.sb-nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--teal)}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{background:none;border:none;color:rgba(255,255,255,.55);font-family:var(--font);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-logout:hover{color:#fff}
/* Main */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.main-header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-title{font-size:18px;font-weight:800;color:var(--text)}
.main-sub{font-size:12px;color:var(--muted);margin-top:2px}
.main-body{flex:1;padding:20px 24px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.red .stat-val{color:var(--red)}
.stat-card.amber .stat-val{color:var(--amber)}
.stat-card.teal .stat-val{color:var(--teal)}
.stat-card.purple .stat-val{color:var(--purple)}
/* Filters */
.filters-bar{background:#fff;border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fi{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;outline:none;color:var(--text);background:#fff}
.fi:focus{border-color:var(--teal)}
.fi-search{flex:1;min-width:180px}
/* Bulk */
.bulk-bar{background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;display:none;align-items:center;justify-content:space-between}
.bulk-bar.show{display:flex}
.bulk-text{color:#fff;font-size:13px;font-weight:700}
.btn-bulk-ok{padding:6px 14px;background:#fff;color:var(--blue);border:none;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.btn-bulk-clr{padding:6px 12px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;font-family:var(--font);font-size:13px;cursor:pointer;margin-left:8px}
/* Table */
.table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.cell-clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;display:block}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-oui{background:var(--green-bg);color:var(--green)}
.b-non{background:var(--red-bg);color:var(--red)}
.b-auto{background:#dbeafe;color:#1e40af}
.b-pend{background:var(--amber-bg);color:var(--amber)}
.b-req{background:var(--purple-bg);color:var(--purple)}
.b-rpl{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
/* Action buttons */
.btn-a{padding:4px 9px;border:none;border-radius:5px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-a:hover{opacity:.8}
.btn-a-oui{background:var(--green-bg);color:var(--green)}
.btn-a-non{background:var(--red-bg);color:var(--red)}
.btn-a-req{background:var(--purple-bg);color:var(--purple)}
.btn-a-edit{background:#f1f5f9;color:var(--muted)}
/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border)}
.pag-info{font-size:12px;color:var(--muted)}
.pag-btns{display:flex;gap:4px}
.btn-pg{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:var(--font);font-size:12px;cursor:pointer}
.btn-pg:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.btn-pg:disabled{opacity:.4;cursor:not-allowed}
.btn-pg.cur{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,48,135,.3);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.modal-card{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,48,135,.25);max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px}
.modal-info{background:#f8fafc;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;line-height:1.6}
.modal-info strong{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.radio-group{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.radio-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px}
.radio-item:hover{border-color:var(--teal)}
.radio-item input{accent-color:var(--teal);width:16px;height:16px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:9px 18px;border:1.5px solid var(--border);border-radius:7px;background:#fff;font-family:var(--font);font-size:13px;cursor:pointer;color:var(--muted)}
.btn-confirm{padding:9px 18px;background:var(--blue);border:none;border-radius:7px;color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}
/* Progress */
.prog-wrap{background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:4px;transition:width .4s}
/* RPL grid admin */
.rpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:20px}
.rpl-card{background:#fff;border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid var(--teal)}
.rpl-name{font-size:14px;font-weight:700;color:var(--text)}
.rpl-code{font-size:11px;color:var(--muted);margin-top:1px}
.rpl-stats{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.rms{flex:1;text-align:center}
.rms-val{font-size:18px;font-weight:800}
.rms-lbl{font-size:10px;color:var(--muted)}
/* Export button */
.btn-export{padding:10px 20px;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-export:hover{opacity:.9}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
/* Transmis badge */
.from-badge{background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-left:4px}
</style>
</head>

let DATA=[],DECS={},curRPL=null,isAdmin=false,curView='table',modal=null,pg=1,sel=new Set(),F={q:'',status:'all',poste:'',type:'',theme:''};

async function decompress(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');
  const wr=ds.writable.getWriter();wr.write(bytes);wr.close();
  const rd=ds.readable.getReader(),chunks=[];
  while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value);}
  const tot=chunks.reduce((a,c)=>a+c.length,0),res=new Uint8Array(tot);
  let off=0;for(const c of chunks){res.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(res));
}

async function loadData(){
  // Try localStorage cache first for speed
  try{
    const r=localStorage.getItem(DD);
    if(r){DATA=JSON.parse(r);return;}
  }catch(e){}
  document.getElementById('lmsg').textContent='Décompression des données...';
  DATA=await decompress(B64);
  try{localStorage.setItem(DD,JSON.stringify(DATA));}catch(e){}
}

async function loadDecs(){
  document.getElementById('lmsg').textContent='Chargement des décisions...';
  try{
    const {data,error}=await _supa.from('decisions').select('*');
    if(error)throw error;
    DECS={};
    data.forEach(r=>{
      DECS[r.id]={
        status:r.status,
        motif:r.motif,
        requalTo:r.requal_to,
        requalFrom:r.requal_from,
        byRPL:r.by_rpl,
        auto:r.auto,
        date:r.date_decision
      };
    });
  }catch(e){
    console.error('Supabase loadDecs error:',e);
    // Fallback to localStorage
    try{const r=localStorage.getItem(DK);if(r)DECS=JSON.parse(r);}catch(e2){}
  }
}

async function saveDecs(){
  // Local backup
  try{localStorage.setItem(DK,JSON.stringify(DECS));}catch(e){}
}

async function saveDecision(id){
  const d=DECS[id];
  if(!d)return;
  try{
    await _supa.from('decisions').upsert({
      id:id,
      status:d.status,
      motif:d.motif||null,
      requal_to:d.requalTo||null,
      requal_from:d.requalFrom||null,
      by_rpl:d.byRPL||null,
      auto:d.auto||false,
      date_decision:d.date||null
    },{onConflict:'id'});
  }catch(e){console.error('Supabase save error:',e);}
}

async function saveDecisions(ids){
  const rows=ids.map(id=>{
    const d=DECS[id];
    return{id,status:d.status,motif:d.motif||null,requal_to:d.requalTo||null,
      requal_from:d.requalFrom||null,by_rpl:d.byRPL||null,auto:d.auto||false,date_decision:d.date||null};
  });
  try{
    await _supa.from('decisions').upsert(rows,{onConflict:'id'});
  }catch(e){console.error('Supabase batch save error:',e);}
}

async function applyAutoOUI(){
  const ids=[];
  DATA.forEach(r=>{
    if(AUTO_TYPES.includes(r.type)&&!DECS[r.id]){
      DECS[r.id]={status:'OUI',auto:true,date:today()};ids.push(r.id);
    }
  });
  if(ids.length){saveDecs();await saveDecisions(ids);}
}

function today(){return new Date().toLocaleDateString('fr-FR');}

async function init(){
  try{
    _supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  }catch(e){
    document.getElementById('lmsg').textContent='Erreur Supabase: '+e.message;
    return;
  }
  try{
    await loadData();
  }catch(e){
    document.getElementById('lmsg').textContent='Erreur chargement données: '+e.message;
    return;
  }
  try{
    await loadDecs();
  }catch(e){
    console.error('Erreur loadDecs:',e);
  }
  try{
    await applyAutoOUI();
  }catch(e){
    console.error('Erreur applyAutoOUI:',e);
  }
  document.getElementById('app').innerHTML='';
  renderLogin();
}

// ===== FILTERED RECORDS =====
function getMyRecords(){
  if(isAdmin)return DATA;
  return DATA.filter(r=>{
    if(r.rpl===curRPL)return true;
    const d=DECS[r.id];
    if(d&&d.status==='REQUALIFIE'&&d.requalTo===curRPL)return true;
    return false;
  });
}

function getFiltered(){
  let recs=getMyRecords();
  const q=F.q.toLowerCase();
  if(q)recs=recs.filter(r=>
    r.racine.toLowerCase().includes(q)||
    r.fonction.toLowerCase().includes(q)||
    r.entite.toLowerCase().includes(q)||
    r.theme.toLowerCase().includes(q)
  );
  if(F.type)recs=recs.filter(r=>r.type===F.type);
  if(F.poste)recs=recs.filter(r=>r.fonction===F.poste);
  if(F.theme)recs=recs.filter(r=>r.theme===F.theme);
  if(F.status!=='all'){
    recs=recs.filter(r=>{
      const d=DECS[r.id];
      const s=d?d.status:'PENDING';
      if(F.status==='PENDING')return s==='PENDING';
      return s===F.status;
    });
  }
  if(isAdmin&&F.rpl)recs=recs.filter(r=>r.rpl===F.rpl);
  return recs;
}

function getStats(recs){
  const tot=recs.length,stats={OUI:0,NON:0,REQUALIFIE:0,AUTO:0,PENDING:0};
  recs.forEach(r=>{
    const d=DECS[r.id];
    if(!d){stats.PENDING++;return;}
    if(d.auto)stats.AUTO++;
    stats[d.status]=(stats[d.status]||0)+1;
    if(d.status==='PENDING')stats.PENDING++;
  });
  return{tot,...stats};
}

async function quickOUI(id){

  DECS[id]={status:'OUI',date:today(),byRPL:curRPL||'admin'};
  saveDecs();
  await saveDecision(id);
  renderMain();
}

function toggleSel(id,cb){if(cb.checked)sel.add(id);else sel.delete(id);renderMain();}

function toggleAll(cb,ids){
  ids.forEach(id=>{const d=DECS[id];if(!d||!d.auto){if(cb.checked)sel.add(id);else sel.delete(id);}});
  renderMain();
}

async function bulkValidate(){
  const ids=[];
  sel.forEach(id=>{
    const d=DECS[id];
    if(!d||!d.auto){DECS[id]={status:'OUI',date:today(),byRPL:curRPL||'admin'};ids.push(id);}
  });
  saveDecs();
  await saveDecisions(ids);
  sel=new Set();renderMain();
}

function renderProgressView(m){

// ===== EXPORT XLSX =====
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  // Onglet 1 - Base complète
  const rows1=[['Racine','Fonction','Entité','Thématique','Type de formation','RPL assigné','Statut','Motif refus','Requalifié vers','Requalifié par','Date','Auto']];
  DATA.forEach(r=>{
    const d=DECS[r.id]||{};
    rows1.push([r.racine,r.fonction,r.entite,r.theme,r.type,r.rpl,d.status||'En attente',d.motif||'',d.requalTo||'',d.requalFrom||'',d.date||'',d.auto?'Oui':'']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows1),'Base complète');

  // Onglet 2 - Par collaborateur
  const byRacine={};
  DATA.forEach(r=>{
    if(!byRacine[r.racine])byRacine[r.racine]={racine:r.racine,fonction:r.fonction,entite:r.entite,total:0,oui:[],non:[],pend:[]};
    const b=byRacine[r.racine];b.total++;
    const d=DECS[r.id];
    const s=d?d.status:'PENDING';
    if(s==='OUI')b.oui.push(r.theme);
    else if(s==='NON')b.non.push(r.theme);
    else b.pend.push(r.theme);
  });
  const rows2=[['Racine','Fonction','Entité','Nb demandes','Nb validées','Nb refusées','En attente','Taux validation','Formations validées']];
  Object.values(byRacine).forEach(b=>{
    const pct=b.total?Math.round(b.oui.length/b.total*100)+'%':'0%';
    rows2.push([b.racine,b.fonction,b.entite,b.total,b.oui.length,b.non.length,b.pend.length,pct,b.oui.join(' | ')]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows2),'Parcours collaborateurs');

  // Onglet 3 - Par RPL
  const rows3=[['RPL','Responsable','Total','OUI','NON','Requalifiées','En attente','% avancement']];
  Object.keys(RPL_CONFIG).forEach(rpl=>{
    const recs=DATA.filter(r=>r.rpl===rpl);
    let oui=0,non=0,req=0,pend=0;
    recs.forEach(r=>{const d=DECS[r.id];if(!d){pend++;return;}if(d.status==='OUI')oui++;else if(d.status==='NON')non++;else if(d.status==='REQUALIFIE')req++;else pend++;});
    const tot=recs.length;const pct=tot?Math.round((oui+non+req)/tot*100)+'%':'0%';
    rows3.push([rpl,RPL_CONFIG[rpl].name,tot,oui,non,req,pend,pct]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows3),'Avancement RPL');
  XLSX.writeFile(wb,`BEF_2026_Export_${today().replace(/\//g,'-')}.xlsx`);
}
